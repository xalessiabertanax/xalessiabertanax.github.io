<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Banner | Alessia Bertana</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --accent-pink: #D100A6; 
        }

        body {
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        #banner-export {
            width: 1584px;
            height: 396px;
            background-image: url('images/Banner.png'); 
            background-size: cover;
            background-position: center;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: flex-end; 
            padding-right: 80px; 
            padding-bottom: 50px; 
            box-sizing: border-box;
            z-index: 10;
        }

        .brand-block {
            display: flex;
            align-items: baseline;
            margin-bottom: 5px;
        }

        .name, .surname {
            font-size: 72px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -2px;
            line-height: 1;
        }

        .dot {
            color: var(--accent-pink);
            font-size: 80px;
            margin: 0 5px;
            line-height: 0;
        }

        .tagline {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* De nieuwe website box */
        .website-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 18px;
            border: 2px solid var(--accent-pink);
            border-radius: 50px; /* Ronde randen */
            background-color: rgba(209, 0, 166, 0.05); /* Hele lichte roze gloed */
        }

        .website-box svg {
            width: 18px;
            height: 18px;
            fill: var(--accent-pink);
        }

        .website-url {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-pink);
            letter-spacing: 0.5px;
        }

        .ui-panel { margin-top: 30px; }
        .btn {
            background: #1A1A1A; color: white; padding: 15px 40px; border-radius: 8px;
            font-weight: 600; border: none; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #444; }
    </style>
</head>
<body>

    <div id="banner-export">
        <div class="content">
            <div class="brand-block">
                <span class="name">Alessia</span>
                <span class="dot">.</span>
                <span class="surname">Bertana</span>
            </div>
            <div class="tagline">Product & UX Designer</div>
            
            <div class="website-box">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                <span class="website-url">www.alessiabertana.nl</span>
            </div>
        </div>
    </div>

    <div class="ui-panel">
        <button class="btn" onclick="downloadBanner()">Download Banner met Website</button>
    </div>

    <script>
        function downloadBanner() {
            const banner = document.getElementById('banner-export');
            html2canvas(banner, {
                scale: 3, 
                useCORS: true,
                allowTaint: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Alessia_Bertana_Banner_Website.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
